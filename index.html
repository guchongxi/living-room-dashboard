<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>客厅时钟</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;600;700&display=swap');

  :root {
    --bg-day: #f5f0eb;
    --bg-night: #0f1117;
    --text-day: #1a1a2e;
    --text-night: #e8e6e3;
    --muted-day: #8a8580;
    --muted-night: #6b6b7b;
    --accent-day: #e07a3a;
    --accent-night: #6c8cff;
    --card-day: rgba(255,255,255,0.6);
    --card-night: rgba(255,255,255,0.06);
    --border-day: rgba(0,0,0,0.06);
    --border-night: rgba(255,255,255,0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    transition: background 1.5s ease, color 1.5s ease;
  }

  body {
    background: var(--bg-night);
    color: var(--text-night);
  }

  .container {
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 20px 40px;
    position: relative;
  }

  /* 上半区：时钟，占满横向 */
  .top-panel {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
  }

  /* 下半区：日期 + 天气，横向排列 */
  .bottom-panel {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding-bottom: 20px;
    gap: 40px;
    z-index: 1;
  }

  /* Ambient glow */
  .ambient {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    filter: blur(120px);
    opacity: 0.15;
    pointer-events: none;
    transition: background 1.5s ease;
  }

  .day .ambient { background: var(--accent-day); }
  .night .ambient { background: var(--accent-night); }

  /* Time */
  .time-section {
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .time {
    font-size: clamp(160px, 28vw, 400px);
    font-weight: 700;
    letter-spacing: -6px;
    line-height: 0.9;
    font-variant-numeric: tabular-nums;
  }

  .seconds {
    font-size: clamp(60px, 10vw, 140px);
    font-weight: 600;
    vertical-align: baseline;
    margin-left: 8px;
    opacity: 0.6;
  }

  .date-section {
    text-align: left;
    position: relative;
    z-index: 1;
  }

  .weekday {
    font-size: clamp(20px, 3vw, 32px);
    font-weight: 600;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .full-date {
    font-size: clamp(16px, 2.2vw, 24px);
    font-weight: 300;
    opacity: 0.5;
  }

  /* Divider */
  .divider {
    width: 40px;
    height: 1px;
    margin-bottom: 40px;
    transition: background 1.5s ease;
  }

  .day .divider { background: var(--border-day); }
  .night .divider { background: var(--border-night); }

  /* Weather */
  .weather-section {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    position: relative;
    z-index: 1;
  }

  .weather-main {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .weather-icon {
    font-size: clamp(36px, 5vh, 56px);
    line-height: 1;
    filter: drop-shadow(0 4px 20px rgba(0,0,0,0.1));
  }

  .weather-temp {
    font-size: clamp(28px, 4vh, 48px);
    font-weight: 300;
    letter-spacing: -2px;
  }

  .weather-desc {
    font-size: clamp(14px, 1.8vh, 20px);
    font-weight: 400;
    opacity: 0.5;
  }

  .weather-details {
    display: flex;
    gap: 20px;
    margin-top: 8px;
    font-size: clamp(12px, 1.4vh, 15px);
    opacity: 0.4;
    font-weight: 300;
  }

  .weather-details span {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  /* Forecast row */
  .forecast {
    display: flex;
    gap: 12px;
    margin-top: 8px;
    position: relative;
    z-index: 1;
  }

  .forecast-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    border-radius: 12px;
    transition: background 1.5s ease;
  }

  .day .forecast-item { background: var(--card-day); }
  .night .forecast-item { background: var(--card-night); }

  .forecast-day {
    font-size: 13px;
    opacity: 0.4;
    font-weight: 400;
  }

  .forecast-icon {
    font-size: 24px;
    line-height: 1;
  }

  .forecast-temp {
    font-size: 16px;
    font-weight: 300;
    font-variant-numeric: tabular-nums;
  }

  /* Loading */
  .loading {
    opacity: 0;
    animation: fadeIn 1s ease forwards;
  }

  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* Greeting */
  .greeting {
    font-size: clamp(13px, 1.4vh, 17px);
    font-weight: 300;
    opacity: 0.25;
    letter-spacing: 2px;
    z-index: 1;
  }

  /* Error state */
  .weather-error {
    font-size: 16px;
    opacity: 0.4;
    font-weight: 300;
  }
</style>
</head>
<body class="night loading">

<div class="ambient" style="top: -200px; left: -200px;"></div>
<div class="ambient" style="bottom: -200px; right: -200px;"></div>

<div class="container">
  <div class="top-panel">
    <div class="time-section">
      <div class="time" id="time">--:--<span class="seconds" id="seconds">00</span></div>
    </div>
  </div>

  <div class="bottom-panel">
    <div class="date-section">
      <div class="weekday" id="weekday">------</div>
      <div class="full-date" id="fullDate">----年--月--日</div>
      <div class="greeting" id="greeting"></div>
    </div>
    <div class="weather-section" id="weatherSection">
      <div class="weather-main">
        <div class="weather-icon" id="weatherIcon">⏳</div>
        <div class="weather-temp" id="weatherTemp">--°</div>
      </div>
      <div class="weather-desc" id="weatherDesc">加载中...</div>
      <div class="weather-details" id="weatherDetails"></div>
      <div class="forecast" id="forecast"></div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  let LAT = 30.29;
  let LNG = 120.16;

  const WEEKDAYS = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
  const FORECAST_DAY_NAMES = ['今天', '明天', '后天'];
  const WEATHER_MAP = {
    0:  ['☀️', '晴'],       1:  ['🌤️', '大部晴朗'],  2:  ['⛅', '多云'],
    3:  ['☁️', '阴天'],     45: ['🌫️', '雾'],         48: ['🌫️', '雾凇'],
    51: ['🌦️', '小毛毛雨'], 53: ['🌦️', '毛毛雨'],     55: ['🌦️', '大毛毛雨'],
    56: ['🌧️', '冻毛毛雨'], 57: ['🌧️', '冻雨'],       61: ['🌧️', '小雨'],
    63: ['🌧️', '中雨'],     65: ['🌧️', '大雨'],       66: ['🌧️', '冻雨'],
    67: ['🌧️', '大冻雨'],   71: ['🌨️', '小雪'],       73: ['🌨️', '中雪'],
    75: ['❄️', '大雪'],     77: ['🌨️', '雪粒'],       80: ['🌦️', '阵雨'],
    81: ['🌧️', '中阵雨'],   82: ['⛈️', '大阵雨'],     85: ['🌨️', '阵雪'],
    86: ['❄️', '大阵雪'],   95: ['⛈️', '雷暴'],       96: ['⛈️', '雷暴冰雹'],
    99: ['⛈️', '强雷暴冰雹'],
  };

  // 缓存 DOM 引用
  const $time = document.getElementById('time');
  const $weekday = document.getElementById('weekday');
  const $fullDate = document.getElementById('fullDate');
  const $greeting = document.getElementById('greeting');
  const $weatherIcon = document.getElementById('weatherIcon');
  const $weatherTemp = document.getElementById('weatherTemp');
  const $weatherDesc = document.getElementById('weatherDesc');
  const $weatherDetails = document.getElementById('weatherDetails');
  const $forecast = document.getElementById('forecast');

  // 记录上次更新的日期相关值，避免无变化时重复写 DOM
  let lastDateStr = '';
  let lastGreeting = '';

  // 问候语：按小时分段
  function getGreeting(hour) {
    if (hour < 6)  return '夜深了，早点休息';
    if (hour < 9)  return '早安';
    if (hour < 12) return '上午好';
    if (hour < 14) return '中午好';
    if (hour < 18) return '下午好';
    if (hour < 22) return '晚上好';
    return '夜深了，早点休息';
  }

  // 对齐到下一秒整点，消除 setInterval 漂移
  function scheduleClock() {
    const now = Date.now();
    const ms = now % 1000;
    const delay = ms === 0 ? 1000 : 1000 - ms;
    setTimeout(function() {
      updateClock();
      scheduleClock();
    }, delay);
  }

  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2, '0');
    const m = String(now.getMinutes()).padStart(2, '0');
    const s = String(now.getSeconds()).padStart(2, '0');

    // 时间每秒必变，直接更新
    $time.innerHTML = h + ':' + m + '<span class="seconds">' + s + '</span>';

    // 日期/星期/问候语：只在变化时更新
    const day = now.getDay();
    const dateStr = now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日' + day;
    if (dateStr !== lastDateStr) {
      lastDateStr = dateStr;
      $weekday.textContent = WEEKDAYS[day];
      $fullDate.textContent = now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日';
    }

    const greeting = getGreeting(now.getHours());
    if (greeting !== lastGreeting) {
      lastGreeting = greeting;
      $greeting.textContent = greeting;
    }
  }

  async function fetchWeather() {
    try {
      const resp = await fetch(
        'https://api.open-meteo.com/v1/forecast?latitude=' + LAT +
        '&longitude=' + LNG +
        '&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m' +
        '&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=5'
      );
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();

      var current = data.current;
      var w = WEATHER_MAP[current.weather_code] || ['🌡️', '未知'];

      $weatherIcon.textContent = w[0];
      $weatherTemp.textContent = Math.round(current.temperature_2m) + '°';
      $weatherDesc.textContent = w[1];
      $weatherDetails.innerHTML =
        '<span>体感 ' + Math.round(current.apparent_temperature) + '°</span>' +
        '<span>湿度 ' + current.relative_humidity_2m + '%</span>' +
        '<span>风速 ' + Math.round(current.wind_speed_10m) + ' km/h</span>';

      // 预报：拼接字符串一次性写入，避免循环内 innerHTML +=
      var daily = data.daily;
      var count = Math.min(4, daily.time.length);
      var html = '';
      for (var i = 1; i < count; i++) {
        var fi = WEATHER_MAP[daily.weather_code[i]] || ['🌡️', '未知'];
        var dayName = i < 3 ? FORECAST_DAY_NAMES[i] : WEEKDAYS[new Date(daily.time[i]).getDay()];
        html += '<div class="forecast-item"><div class="forecast-day">' + dayName +
          '</div><div class="forecast-icon">' + fi[0] +
          '</div><div class="forecast-temp">' + Math.round(daily.temperature_2m_max[i]) +
          '° / ' + Math.round(daily.temperature_2m_min[i]) + '°</div></div>';
      }
      $forecast.innerHTML = html;
    } catch (e) {
      console.error('Weather fetch failed:', e);
      $weatherDesc.textContent = '天气加载失败';
      $weatherIcon.textContent = '⚠️';
      $weatherTemp.textContent = '--°';
    }
  }

  // Geolocation
  function getGeoLocation() {
    return new Promise(function(resolve) {
      if (!navigator.geolocation) { resolve(null); return; }
      navigator.geolocation.getCurrentPosition(
        function(pos) { resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }); },
        function() { resolve(null); },
        { timeout: 5000 }
      );
    });
  }

  // 启动
  (async function init() {
    updateClock();
    scheduleClock();

    var geo = await getGeoLocation();
    if (geo) { LAT = geo.lat; LNG = geo.lng; }

    fetchWeather();
    setInterval(fetchWeather, 600000);
  })();
})();
</script>

</body>
</html>
