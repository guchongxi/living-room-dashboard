<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="客厅时钟">
<meta name="format-detection" content="telephone=no">
<title>客厅时钟</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<style>
  @font-face { font-family: 'Inter'; font-weight: 200; src: url('fonts/Inter-200.ttf') format('truetype'); }
  @font-face { font-family: 'Inter'; font-weight: 300; src: url('fonts/Inter-300.ttf') format('truetype'); }
  @font-face { font-family: 'Inter'; font-weight: 400; src: url('fonts/Inter-400.ttf') format('truetype'); }
  @font-face { font-family: 'Inter'; font-weight: 600; src: url('fonts/Inter-600.ttf') format('truetype'); }
  @font-face { font-family: 'Inter'; font-weight: 700; src: url('fonts/Inter-700.ttf') format('truetype'); }

  /* iOS 10 兼容：不用 CSS Variables，所有值直接写死 */

  * {
    margin: 0;
    padding: 0;
    -webkit-box-sizing: border-box;
    box-sizing: border-box;
  }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #06080d;
    color: #f0eeeb;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-text-size-adjust: 100%;
    -webkit-font-smoothing: antialiased;
  }

  /* 主容器 — 使用旧版 Flexbox + safe area */
  .container {
    width: 100%;
    height: 100%;
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: vertical;
    -webkit-box-direction: normal;
    -webkit-flex-direction: column;
    flex-direction: column;
    padding: 20px 40px;
    padding-top: calc(20px + env(safe-area-inset-top));
    padding-bottom: calc(20px + env(safe-area-inset-bottom));
    padding-left: calc(40px + env(safe-area-inset-left));
    padding-right: calc(40px + env(safe-area-inset-right));
  }

  /* 上半区：时钟 */
  .top-panel {
    -webkit-box-flex: 1;
    -webkit-flex: 1;
    flex: 1;
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-align: center;
    -webkit-align-items: center;
    align-items: center;
    -webkit-box-pack: center;
    -webkit-justify-content: center;
    justify-content: center;
    z-index: 1;
  }

  /* 下半区：日期 + 天气 — iOS 10 不支持 gap，用 margin 代替 */
  .bottom-panel {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-align: end;
    -webkit-align-items: flex-end;
    align-items: flex-end;
    -webkit-box-pack: justify;
    -webkit-justify-content: space-between;
    justify-content: space-between;
    z-index: 1;
  }

  /* Ambient glow */
  .ambient {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    -webkit-filter: blur(120px);
    filter: blur(120px);
    opacity: 0.15;
    pointer-events: none;
    background: #6c8cff;
  }

  /* Time */
  .time-section {
    text-align: center;
    position: relative;
    z-index: 1;
  }

  /* clamp() iOS 10 不支持，用 vw 做回退 */
  .time {
    font-size: 28vw;
    font-size: clamp(160px, 28vw, 400px);
    font-weight: 700;
    letter-spacing: -6px;
    line-height: 0.9;
    font-variant-numeric: tabular-nums;
  }

  .seconds {
    font-size: 10vw;
    font-size: clamp(60px, 10vw, 140px);
    font-weight: 600;
    vertical-align: baseline;
    margin-left: 8px;
    opacity: 0.6;
  }

  .date-section {
    text-align: left;
    position: relative;
    z-index: 1;
    margin-right: 40px;
  }

  .weekday {
    font-size: 72px;
    font-size: clamp(20px, 3vw, 32px);
    font-weight: 600;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .full-date {
    font-size: 56px;
    font-size: clamp(16px, 2.2vw, 24px);
    font-weight: 300;
    opacity: 0.7;
    white-space: nowrap;
  }

  /* Divider */
  .divider {
    width: 40px;
    height: 1px;
    margin-bottom: 40px;
    background: rgba(255,255,255,0.2);
  }

  /* Weather */
  .weather-section {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-orient: vertical;
    -webkit-box-direction: normal;
    -webkit-flex-direction: column;
    flex-direction: column;
    -webkit-box-align: end;
    -webkit-align-items: flex-end;
    align-items: flex-end;
    position: relative;
    z-index: 1;
  }

  .weather-main {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-align: center;
    -webkit-align-items: center;
    align-items: center;
  }

  .weather-icon {
    margin-right: 12px;
    font-size: 48px;
    font-size: clamp(36px, 5vh, 56px);
    line-height: 1;
  }

  .weather-temp {
    font-size: 112px;
    font-size: clamp(28px, 4vh, 48px);
    font-weight: 300;
    letter-spacing: -2px;
  }

  .weather-desc {
    margin-top: 4px;
    font-size: 18px;
    font-size: clamp(14px, 1.8vh, 20px);
    font-weight: 400;
    opacity: 0.7;
  }

  .weather-details {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-align: center;
    -webkit-align-items: center;
    align-items: center;
    margin-top: 8px;
    font-size: 24px;
    font-size: clamp(12px, 1.4vh, 15px);
    opacity: 0.8;
    font-weight: 300;
  }

  .weather-details span {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-align: center;
    -webkit-align-items: center;
    align-items: center;
  }

  .weather-details span + span {
    margin-left: 20px;
  }

  /* Forecast row */
  .forecast {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-align: center;
    -webkit-align-items: center;
    align-items: center;
    margin-top: 8px;
    position: relative;
    z-index: 1;
  }

  .forecast-item {
    display: -webkit-box;
    display: -webkit-flex;
    display: flex;
    -webkit-box-align: center;
    -webkit-align-items: center;
    align-items: center;
    padding: 8px 12px;
    border-radius: 12px;
    background: rgba(255,255,255,0.15);
  }

  .forecast-item + .forecast-item {
    margin-left: 12px;
  }

  .forecast-day {
    font-size: 15px;
    opacity: 0.6;
    font-weight: 400;
  }

  .forecast-icon {
    margin: 0 6px;
    font-size: 26px;
    line-height: 1;
  }

  .forecast-temp {
    font-size: 18px;
    font-weight: 300;
    font-variant-numeric: tabular-nums;
  }

  /* Loading */
  .loading {
    opacity: 0;
    -webkit-animation: fadeIn 1s ease forwards;
    animation: fadeIn 1s ease forwards;
  }

  @-webkit-keyframes fadeIn {
    to { opacity: 1; }
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }

  /* Greeting */
  .greeting {
    font-size: 16px;
    font-size: clamp(13px, 1.4vh, 17px);
    font-weight: 300;
    opacity: 0.5;
    letter-spacing: 2px;
    z-index: 1;
  }

  /* Error state */
  .weather-error {
    font-size: 16px;
    opacity: 0.7;
    font-weight: 300;
  }
</style>
</head>
<body class="loading">

<div class="ambient" style="top: -200px; left: -200px;"></div>
<div class="ambient" style="bottom: -200px; right: -200px;"></div>

<div class="container">
  <div class="top-panel">
    <div class="time-section">
      <div class="time" id="time">--:--<span class="seconds" id="seconds">00</span></div>
    </div>
  </div>

  <div class="bottom-panel">
    <div class="date-section">
      <div class="weekday" id="weekday">------</div>
      <div class="full-date" id="fullDate">----年--月--日</div>
      <div class="greeting" id="greeting"></div>
    </div>
    <div class="weather-section" id="weatherSection">
      <div class="weather-main">
        <div class="weather-icon" id="weatherIcon">⏳</div>
        <div class="weather-temp" id="weatherTemp">--°</div>
      </div>
      <div class="weather-desc" id="weatherDesc">加载中...</div>
      <div class="weather-details" id="weatherDetails"></div>
      <div class="forecast" id="forecast"></div>
    </div>
  </div>
</div>

<script>
(function() {
  'use strict';

  var LAT = 30.29;
  var LNG = 120.16;

  var WEEKDAYS = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
  var FORECAST_DAY_NAMES = ['今天', '明天', '后天'];
  var WEATHER_MAP = {
    0:  ['☀️', '晴'],       1:  ['🌤️', '大部晴朗'],  2:  ['⛅', '多云'],
    3:  ['☁️', '阴天'],     45: ['🌫️', '雾'],         48: ['🌫️', '雾凇'],
    51: ['🌦️', '小毛毛雨'], 53: ['🌦️', '毛毛雨'],     55: ['🌦️', '大毛毛雨'],
    56: ['🌧️', '冻毛毛雨'], 57: ['🌧️', '冻雨'],       61: ['🌧️', '小雨'],
    63: ['🌧️', '中雨'],     65: ['🌧️', '大雨'],       66: ['🌧️', '冻雨'],
    67: ['🌧️', '大冻雨'],   71: ['🌨️', '小雪'],       73: ['🌨️', '中雪'],
    75: ['❄️', '大雪'],     77: ['🌨️', '雪粒'],       80: ['🌦️', '阵雨'],
    81: ['🌧️', '中阵雨'],   82: ['⛈️', '大阵雨'],     85: ['🌨️', '阵雪'],
    86: ['❄️', '大阵雪'],   95: ['⛈️', '雷暴'],       96: ['⛈️', '雷暴冰雹'],
    99: ['⛈️', '强雷暴冰雹'],
  };

  var $time = document.getElementById('time');
  var $weekday = document.getElementById('weekday');
  var $fullDate = document.getElementById('fullDate');
  var $greeting = document.getElementById('greeting');
  var $weatherIcon = document.getElementById('weatherIcon');
  var $weatherTemp = document.getElementById('weatherTemp');
  var $weatherDesc = document.getElementById('weatherDesc');
  var $weatherDetails = document.getElementById('weatherDetails');
  var $forecast = document.getElementById('forecast');

  var lastDateStr = '';
  var lastGreeting = '';

  function getGreeting(hour) {
    if (hour < 6)  return '夜深了，早点休息';
    if (hour < 9)  return '早安';
    if (hour < 12) return '上午好';
    if (hour < 14) return '中午好';
    if (hour < 18) return '下午好';
    if (hour < 22) return '晚上好';
    return '夜深了，早点休息';
  }

  function scheduleClock() {
    var now = Date.now();
    var ms = now % 1000;
    var delay = ms === 0 ? 1000 : 1000 - ms;
    setTimeout(function() {
      updateClock();
      scheduleClock();
    }, delay);
  }

  function updateClock() {
    var now = new Date();
    var h = String(now.getHours()).padStart(2, '0');
    var m = String(now.getMinutes()).padStart(2, '0');
    var s = String(now.getSeconds()).padStart(2, '0');

    $time.innerHTML = h + ':' + m + '<span class="seconds">' + s + '</span>';

    var day = now.getDay();
    var dateStr = now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日' + day;
    if (dateStr !== lastDateStr) {
      lastDateStr = dateStr;
      $weekday.textContent = WEEKDAYS[day];
      $fullDate.textContent = now.getFullYear() + '年' + (now.getMonth() + 1) + '月' + now.getDate() + '日';
    }

    var greeting = getGreeting(now.getHours());
    if (greeting !== lastGreeting) {
      lastGreeting = greeting;
      $greeting.textContent = greeting;
    }
  }

  function fetchWeather() {
    fetch(
      'https://api.open-meteo.com/v1/forecast?latitude=' + LAT +
      '&longitude=' + LNG +
      '&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m' +
      '&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=5'
    ).then(function(resp) {
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      return resp.json();
    }).then(function(data) {
      var current = data.current;
      var w = WEATHER_MAP[current.weather_code] || ['🌡️', '未知'];

      $weatherIcon.textContent = w[0];
      $weatherTemp.textContent = Math.round(current.temperature_2m) + '°';
      $weatherDesc.textContent = w[1];
      $weatherDetails.innerHTML =
        '<span>体感 ' + Math.round(current.apparent_temperature) + '°</span>' +
        '<span>湿度 ' + current.relative_humidity_2m + '%</span>' +
        '<span>风速 ' + Math.round(current.wind_speed_10m) + ' km/h</span>';

      var daily = data.daily;
      var count = Math.min(4, daily.time.length);
      var html = '';
      for (var i = 1; i < count; i++) {
        var fi = WEATHER_MAP[daily.weather_code[i]] || ['🌡️', '未知'];
        var dayName = i < 3 ? FORECAST_DAY_NAMES[i] : WEEKDAYS[new Date(daily.time[i]).getDay()];
        html += '<div class="forecast-item"><div class="forecast-day">' + dayName +
          '</div><div class="forecast-icon">' + fi[0] +
          '</div><div class="forecast-temp">' + Math.round(daily.temperature_2m_max[i]) +
          '° / ' + Math.round(daily.temperature_2m_min[i]) + '°</div></div>';
      }
      $forecast.innerHTML = html;
    }).catch(function(e) {
      console.error('Weather fetch failed:', e);
      $weatherDesc.textContent = '天气加载失败';
      $weatherIcon.textContent = '⚠️';
      $weatherTemp.textContent = '--°';
    });
  }

  function getGeoLocation() {
    return new Promise(function(resolve) {
      if (!navigator.geolocation) { resolve(null); return; }
      navigator.geolocation.getCurrentPosition(
        function(pos) { resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }); },
        function() { resolve(null); },
        { timeout: 5000 }
      );
    });
  }

  // 启动
  updateClock();
  scheduleClock();

  getGeoLocation().then(function(geo) {
    if (geo) { LAT = geo.lat; LNG = geo.lng; }
    fetchWeather();
    setInterval(fetchWeather, 600000);
  });
})();
</script>

</body>
</html>
